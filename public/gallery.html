<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blessings Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" id="passwordGate">
        <h1>Family Gallery</h1>
        <p class="lead">Enter the gallery password to view and manage blessings.</p>
        <form id="passwordForm">
          <label for="galleryPassword">Password</label>
          <input id="galleryPassword" type="password" autocomplete="current-password" required />
          <div class="actions">
            <button class="btn btn-gold" type="submit">Enter Gallery</button>
          </div>
        </form>
        <p id="passwordStatus" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="card hidden" id="galleryPanel">
        <h1 id="galleryTitle">Blessings Gallery</h1>
        <p class="small">
          Sort, download, or remove uploads. Removing an entry deletes the media file and its metadata.
        </p>
        <div class="controls-row">
          <label for="sortBy">Sort by:</label>
          <select id="sortBy">
            <option value="date-desc">Newest upload date</option>
            <option value="date-asc">Oldest upload date</option>
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
          </select>
          <button id="downloadAllBtn" class="btn btn-secondary" type="button">Download All (.zip)</button>
        </div>
        <p id="galleryStatus" class="status" role="status" aria-live="polite"></p>
        <div id="galleryList" class="gallery-grid"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./config-loader.js"></script>
    <script type="module" src="./gallery.js"></script>
  </body>
</html>
