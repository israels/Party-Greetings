<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greetings Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Fredoka+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" id="passwordGate">
        <h1>Family Gallery</h1>
        <p class="lead">Enter the gallery password to view and manage greetings.</p>
        <form id="passwordForm">
          <label for="galleryPassword">Password</label>
          <input id="galleryPassword" type="password" autocomplete="current-password" required />
          <div class="actions">
            <button class="btn btn-gold" type="submit">Enter Gallery</button>
          </div>
        </form>
        <p id="passwordStatus" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="card hidden" id="galleryPanel">
        <h1 id="galleryTitle">Greetings Gallery</h1>
        <p class="small">
          Sort, download, or remove uploads. Removing an entry deletes the media file and its metadata.
        </p>
        <div class="controls-row">
          <label for="sortBy">Sort by:</label>
          <select id="sortBy">
            <option value="date-desc">Newest upload date</option>
            <option value="date-asc">Oldest upload date</option>
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
          </select>
          <label for="sequenceScope">Sequential:</label>
          <select id="sequenceScope">
            <option value="video">Videos only</option>
            <option value="audio">Audio only</option>
            <option value="both">Videos and audio</option>
          </select>
          <button id="playAllVideosBtn" class="btn btn-gold" type="button">Play Sequence</button>
        </div>
        <p id="galleryStatus" class="status" role="status" aria-live="polite"></p>
        <div id="galleryList" class="gallery-grid"></div>
      </section>
    </main>

    <div id="mediaModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-content" id="mediaModalContent" tabindex="-1">
        <button class="btn-modal-close" id="modalCloseBtn" type="button" aria-label="Close enlarged playback">
          ×
        </button>
        <div class="modal-media-shell" id="modalMediaShell"></div>
        <div class="modal-meta-block">
          <div class="modal-header-row">
            <div>
              <h2 id="modalTitle">Preview</h2>
              <p id="modalSubtitle" class="modal-subtitle"></p>
            </div>
            <div class="modal-actions-row">
              <button id="modalFullscreenBtn" class="btn btn-secondary" type="button">Close Preview</button>
              <button id="modalDownloadBtn" class="btn btn-secondary" type="button">Download</button>
              <button id="modalDeleteBtn" class="btn" type="button">Delete</button>
            </div>
          </div>
            <div id="modalSequenceControls" class="modal-sequence-controls hidden">
              <div class="modal-sequence-actions">
                <button id="modalPrevBtn" class="btn btn-secondary modal-sequence-btn" type="button">Previous</button>
                <button id="modalPauseBtn" class="btn btn-secondary modal-sequence-btn" type="button">Pause</button>
                <button id="modalNextBtn" class="btn btn-secondary modal-sequence-btn" type="button">Next</button>
              </div>
              <div id="modalSequenceProgress" class="modal-sequence-progress"></div>
            </div>
            <button id="modalAutoplayContinueBtn" class="btn btn-gold modal-autoplay-continue hidden" type="button">
              Tap to continue playback
            </button>
          <div id="modalMetaText" class="modal-meta-text"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./config-loader.js"></script>
    <script type="module" src="./gallery.js"></script>
  </body>
</html>
