# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write runtime config files
        env:
          FIREBASE_CONFIG_JS: ${{ secrets.FIREBASE_CONFIG_JS }}
          APP_CONFIG_JS: ${{ secrets.APP_CONFIG_JS }}
          GUEST_OF_HONOR_PHOTO_B64: ${{ secrets.GUEST_OF_HONOR_PHOTO_B64 }}
          GUEST_OF_HONOR_PHOTO_URL: ${{ secrets.GUEST_OF_HONOR_PHOTO_URL }}
        run: |
          if [ -z "$FIREBASE_CONFIG_JS" ]; then
            echo "Missing secret: FIREBASE_CONFIG_JS"
            exit 1
          fi
          if [ -z "$APP_CONFIG_JS" ]; then
            echo "Missing secret: APP_CONFIG_JS"
            exit 1
          fi
          printf "%s" "$FIREBASE_CONFIG_JS" > public/firebase-config.js
          printf "%s" "$APP_CONFIG_JS" > public/config.js
          mkdir -p public/local-media

          if [ -n "$GUEST_OF_HONOR_PHOTO_B64" ]; then
            printf "%s" "$GUEST_OF_HONOR_PHOTO_B64" | base64 --decode > public/local-media/guest-of-honor.jpg
          elif [ -n "$GUEST_OF_HONOR_PHOTO_URL" ]; then
            curl --fail --location --silent --show-error "$GUEST_OF_HONOR_PHOTO_URL" --output public/local-media/guest-of-honor.jpg
          else
            echo "Missing guest photo source. Set either GUEST_OF_HONOR_PHOTO_B64 or GUEST_OF_HONOR_PHOTO_URL."
            exit 1
          fi
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DANI_BAT_MITZVAH }}
          channelId: live
          projectId: dani-bat-mitzvah
